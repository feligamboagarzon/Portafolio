<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader - Ftools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/ads.css">
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navegación -->
    <nav class="p-4 border-b-4 border-[color:var(--border-color)] flex justify-between items-center bg-[color:var(--bg-color)] sticky top-0 z-10 transition-colors duration-300">
        <div class="flex items-center gap-4">
            <a href="../index.html" class="neo-btn neo-border neo-shadow bg-[color:var(--accent-blue)] text-white hover-bounce w-12 h-12 flex items-center justify-center font-bold text-xl" aria-label="Volver">
                &larr;
            </a>
            <div class="flex items-center gap-2">
                <div class="bg-[color:var(--accent-blue)] text-white w-10 h-10 flex items-center justify-center font-bold rounded neo-border">VID</div>
                <h1 class="text-2xl font-bold tracking-tight hidden sm:block">Downloader</h1>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button class="neo-btn neo-border neo-shadow px-4 py-2 text-sm bg-red-500 text-white hover:bg-red-600 transition-colors hidden sm:block">Limpiar Rastro</button>
            <button id="theme-toggle" class="neo-border neo-shadow neo-btn text-xl flex items-center justify-center p-2 rounded-full w-12 h-12" aria-label="Cambiar Tema">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <!-- Main Downloader -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-3xl w-full bg-[color:var(--card-bg)] p-8 md:p-12 rounded-3xl neo-border neo-shadow-hover">
            <h2 class="text-4xl md:text-5xl font-bold mb-8">
                Pega tu enlace de <span class="text-[color:var(--accent-blue)] bg-[color:var(--accent-yellow)] px-2 rotate-3 inline-block rounded neo-border">video</span>
            </h2>
            
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <input type="url" placeholder="https://..." class="flex-grow px-6 py-4 text-xl rounded-xl neo-border focus:outline-none focus:ring-4 focus:ring-[color:var(--accent-blue)] transition-all">
                <button class="neo-btn neo-border neo-shadow bg-[color:var(--accent-blue)] text-white text-xl py-4 px-8 rounded-xl hover-bounce">Procesar</button>
            </div>

            <!-- Zona de Resultados (Oculta por defecto) -->
            <div class="hidden border-t-4 border-[color:var(--border-color)] pt-8 text-left">
                <h3 class="text-2xl font-bold mb-4">Opciones de Descarga:</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button class="neo-btn neo-border bg-white hover:bg-[color:var(--accent-blue)] hover:text-white transition-colors flex justify-between items-center">
                        <span>MP4 - 1080p</span> <span>⬇️</span>
                    </button>
                    <button class="neo-btn neo-border bg-white hover:bg-[color:var(--accent-blue)] hover:text-white transition-colors flex justify-between items-center">
                        <span>MP4 - 720p</span> <span>⬇️</span>
                    </button>
                    <button class="neo-btn neo-border bg-white hover:bg-[color:var(--accent-blue)] hover:text-white transition-colors flex justify-between items-center">
                        <span>Audio - MP3</span> <span>🎵</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer móvil Limpiar Rastro -->
    <div class="sm:hidden p-4 border-t-4 border-[color:var(--border-color)] flex justify-center bg-[color:var(--bg-color)] sticky bottom-0">
         <button class="w-full neo-btn neo-border neo-shadow px-4 py-3 text-lg bg-red-500 text-white hover:bg-red-600 transition-colors">Limpiar Rastro</button>
    </div>

    <script src="../assets/js/theme-toggle.js"></script>
    <script src="../assets/js/ftools-ads.js"></script>
</body>
</html>
