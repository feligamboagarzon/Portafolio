<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago | moibymoi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="checkout-page">
    <header id="main-header" class="scrolled">
        <a href="index.html" class="logo-container">
            <span class="logo-main">moibymoi</span>
            <span class="logo-tagline">elegant swimwear by Myriam Garzon</span>
        </a>
        <a href="index.html" class="back-to-shop">← Volver a la Tienda</a>
    </header>

    <main class="checkout-container">
        <div class="checkout-form-section">
            <form id="checkout-form" onsubmit="processCheckout(event)">
                <div class="form-group">
                    <h2>Información de Contacto</h2>
                    <input type="email" placeholder="Correo Electrónico" required class="form-input">
                </div>

                <div class="form-group">
                    <h2>Dirección de Envío</h2>
                    <div class="form-row">
                        <input type="text" placeholder="Nombre" required class="form-input">
                        <input type="text" placeholder="Apellido" required class="form-input">
                    </div>
                    <input type="text" placeholder="Dirección" required class="form-input">
                    <input type="text" placeholder="Apartamento, local, etc. (opcional)" class="form-input">
                    <div class="form-row">
                        <input type="text" placeholder="Ciudad" required class="form-input">
                        <input type="text" placeholder="Departamento" required class="form-input">
                        <input type="text" placeholder="Código Postal" required class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <h2>Método de Pago</h2>
                    <p class="payment-note">Selecciona tu método de pago preferido.</p>
                    
                    <div class="payment-methods">
                        <label class="payment-method-label">
                            <input type="radio" name="payment_method" value="card" checked onchange="togglePaymentFields()">
                            <span>Tarjeta de Crédito / Débito</span>
                        </label>
                        <div id="payment-card-fields" class="payment-fields active">
                            <input type="text" placeholder="Número de Tarjeta" class="form-input" maxlength="19">
                            <input type="text" placeholder="Nombre en la Tarjeta" class="form-input">
                            <div class="form-row">
                                <input type="text" placeholder="Fecha de Vencimiento (MM/AA)" class="form-input">
                                <input type="text" placeholder="Código de Seguridad (CVV)" class="form-input" maxlength="4">
                            </div>
                        </div>

                        <label class="payment-method-label">
                            <input type="radio" name="payment_method" value="pse" onchange="togglePaymentFields()">
                            <span>PSE (Transferencia Bancaria)</span>
                        </label>
                        <div id="payment-pse-fields" class="payment-fields">
                            <select class="form-input">
                                <option value="" disabled selected>Selecciona tu Banco</option>
                                <option value="bancolombia">Bancolombia</option>
                                <option value="davivienda">Davivienda</option>
                                <option value="banco_bogota">Banco de Bogotá</option>
                                <option value="bbva">BBVA</option>
                            </select>
                            <select class="form-input">
                                <option value="CC">Cédula de Ciudadanía (CC)</option>
                                <option value="CE">Cédula de Extranjería (CE)</option>
                                <option value="NIT">NIT</option>
                            </select>
                            <input type="text" placeholder="Número de Documento" class="form-input">
                        </div>

                        <label class="payment-method-label">
                            <input type="radio" name="payment_method" value="nequi" onchange="togglePaymentFields()">
                            <span>Nequi</span>
                        </label>
                        <div id="payment-nequi-fields" class="payment-fields">
                            <input type="tel" placeholder="Número de Nequi" class="form-input" maxlength="10">
                        </div>

                        <label class="payment-method-label">
                            <input type="radio" name="payment_method" value="daviplata" onchange="togglePaymentFields()">
                            <span>DaviPlata</span>
                        </label>
                        <div id="payment-daviplata-fields" class="payment-fields">
                            <input type="tel" placeholder="Número de DaviPlata" class="form-input" maxlength="10">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-full checkout-btn">Pagar Ahora</button>
            </form>
        </div>
        <div class="checkout-summary-section">
            <div class="order-summary-box">
                <h2>Resumen del Pedido</h2>
                <div id="checkout-items" class="checkout-items">
                    <!-- Checkout items injected here -->
                </div>
                <div class="summary-totals">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Envío</span>
                        <span>Gratis</span>
                    </div>
                    <div class="summary-row total-row">
                        <span>Total</span>
                        <span id="checkout-total">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">Acción exitosa</div>

    <script src="script.js"></script>
    <script>
        // Specific script for checkout page to render items
        document.addEventListener('DOMContentLoaded', () => {
            renderCheckoutSummary();
        });
    </script>
</body>
</html>
